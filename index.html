<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Parking Finder System</title>
  <meta name="description" content="Find nearby parking in real time, get an automatic best-match recommendation, and check live availability at a glance.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <a class="skip-link" href="#main">Skip to parking list</a>

  <header class="topbar">
    <div class="topbar__brand">
      <span class="topbar__mark" aria-hidden="true"></span>
      <div>
        <p class="topbar__title">Smart Parking Finder</p>
        <p class="topbar__subtitle">Real-time spaces, sorted by distance</p>
      </div>
    </div>

    <button id="findBestBtn" class="find-btn find-btn--desktop" type="button">
      <span class="find-btn__pulse" aria-hidden="true"></span>
      <span class="find-btn__label">Find Best Parking</span>
    </button>

    <button id="adminToggle" class="admin-toggle" type="button" aria-expanded="false" aria-controls="adminPanel">
      Admin
    </button>
  </header>

  <main id="main" class="layout">

    <section class="status-line" aria-live="polite">
      <span id="locationStatus" class="status-line__pill">Locating you&hellip;</span>
      <span id="lotCount" class="status-line__count"></span>
    </section>

    <section id="recommendationPanel" class="recommendation" hidden aria-live="polite"></section>

    <section class="dashboard">
      <h2 class="visually-hidden">Parking areas</h2>
      <div id="parkingGrid" class="parking-grid"></div>
    </section>

    <section id="adminPanel" class="admin-panel" hidden>
      <h2 class="admin-panel__title">Admin &mdash; Update Available Spaces</h2>
      <form id="adminForm" class="admin-form">
        <label class="admin-form__field">
          <span>Parking area</span>
          <select id="adminLotSelect" required></select>
        </label>
        <label class="admin-form__field">
          <span>Available spaces</span>
          <input id="adminSpacesInput" type="number" min="0" required />
        </label>
        <button type="submit" class="admin-form__submit">Update Availability</button>
      </form>
      <p id="adminFeedback" class="admin-form__feedback" role="status"></p>
    </section>

  </main>

  <button id="findBestBtnMobile" class="find-btn find-btn--mobile" type="button">
    <span class="find-btn__pulse" aria-hidden="true"></span>
    <span class="find-btn__label">Find Best Parking</span>
  </button>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
